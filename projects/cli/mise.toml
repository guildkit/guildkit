#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  wait_for = [
    "//projects/shared:build",
    "//projects/backend:build",
    "//projects/guildkit:build",
  ]
  run = "tsdown --watch"

  [tasks.build]
  wait_for = [
    "//projects/shared:build",
    "//projects/backend:build",
    "//projects/guildkit:build",
  ]
  run = "tsdown"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  wait_for = [
    "//projects/shared:build",
    "//projects/backend:build",
    "//projects/guildkit:build",
  ]
  run = "tsc --noEmit"

[env]
_.path = "./node_modules/.bin"
