#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  wait_for = [ "//projects/shared:build" ]
  run = "tsdown --watch --no-clean"

  [tasks.build]
  wait_for = [ "//projects/shared:build" ]
  run = "tsdown"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  wait_for = [
    "//projects/shared:build",
    "//projects/client:build",
    "//projects/db:build",
  ]
  run = [
    # The exported astroConfig builder.
    "tsc --noEmit",
    # The Astro app (React islands + libs) via its own astro/strict tsconfig.
    "tsc --noEmit -p app/tsconfig.json",
  ]

  [tasks.deploy]
  depends = [ "build" ]
  run = "wrangler deploy"

[env]
_.path = "./node_modules/.bin"
