#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  depends = [ "sync" ]
  run = "vite"

  [tasks.build]
  wait_for = [
    "//projects/shared:build",
    "//projects/db:build",
  ]
  run = [
    { task = ":build:*" },
    "tsdown",
  ]
  env = { NODE_ENV = "production" }

  [tasks.lint]
  depends = [ "sync" ]
  run = "tsc --noEmit"

  [tasks.deploy]
  depends = [ "build" ]
  run = "wrangler deploy"

  [tasks.sync]
  run = "wrangler types --env-interface CloudflareBindings"

  [tasks.setup]
  depends_post = "sync"


[env]
_.path = "./node_modules/.bin"
