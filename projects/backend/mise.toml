#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  wait_for = [ "//:sync" ]
  run = "vite"

  [tasks.build]
  wait_for = [ "//:sync" ]
  run = "vite build"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  wait_for = [ "//:sync" ]
  run = "tsc --noEmit"

  [tasks.fix]
  wait_for = [ "//:sync" ]
  run = "prisma format"

  [tasks.deploy]
  depends = [ "build" ]
  run = "wrangler deploy"

  [tasks.sync]
  wait_for = [ "//projects/shared:build" ]
  run = "wrangler types --env-interface CloudflareBindings"

  [tasks.setup]
  run = [{ tasks = [ "setup:*" ]}]

[env]
_.path = "./node_modules/.bin"
