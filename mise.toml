#:schema https://mise.jdx.dev/schema/mise.json

monorepo_root = true

[monorepo]
config_roots = [ "projects/*" ]

[tools]
node = { version = "24", corepack = true }
"npm:nushell" = "latest"

[tasks]
  [tasks.dev]
  run =[{ task = "//projects/...:dev" }]

  [tasks.build]
  run =[{ task = "//projects/...:build" }]

  [tasks.test]
  run =[{ task = "//projects/...:test" }]

  [tasks.lint]
  depends = [ "//projects/...:lint" ]
  run = [
    "tsc --noEmit",
    "eslint",
  ]

  [tasks.fix]
  depends = [ "//projects/...:fix" ]
  run = "eslint --fix"

  [tasks.db]
  run = "psql --username=guildkit --dbname=guildkit --host=localhost --port=5432"

  [tasks.clean]
  depends = [ "clean:*" ]

  # TODO disabled until GA
  # [tasks.publish]
  # run =[{ task = "//projects/...:publish" }]

  [tasks.setup]
  run = [
    { task = "//:setup:*" },
    # { task = "//projects/...:setup" },
    { task = "//projects/...:build" },
  ]

  [tasks.ai-postedit]
  description = "Run tsc and linters to detect and fix the warnings and errors in the codebase"
  depends = [ "//:sync" ]
  run = [
    "tsc --noEmit",
    { task = "//projects/...:lint" },
    "eslint --fix",
    { task = "//projects/...:fix" },
  ]

[hooks]
postinstall = [
  "corepack enable",
  "pnpm install --frozen-lockfile",
  { task = "setup" },
]

[env]
_.file = ".env"
_.path = "./node_modules/.bin"

[settings]
jobs = 8
