#:schema https://mise.jdx.dev/schema/mise.json

experimental_monorepo_root = true

[monorepo]
config_roots = [ "projects/*" ]

[tools]
node = "24"
"npm:nushell" = "latest"

[tasks]
  [tasks.dev]
  depends = [ "//:sync" ]
  run =[{ task = "//projects/...:dev" }]

  [tasks.build]
  depends = [ "//:sync" ]
  run =[{ task = "//projects/...:build" }]

  [tasks.test]
  depends = [ "//:sync" ]
  run =[{ task = "//projects/...:test" }]

  [tasks.lint]
  depends = [ "//:sync" ]
  run = [
    "tsc --noEmit",
    { task = "//projects/...:lint" },
    "eslint",
  ]

  [tasks.fix]
  depends = [ "//:sync" ]
  run = [
    "eslint --fix",
    { task = "//projects/...:fix" },
  ]

  [tasks.db]
  run = "psql --username=guildkit --dbname=guildkit --host=localhost --port=5432"

  [tasks.clean]
  depends = [ "clean:*" ]

  [tasks.refresh]
  depends = [ "clean" ]
  run = [
    "rm --force ./pnpm-lock.yaml",
    "corepack enable",
    "corepack up",
    "pnpm install",
    { task = "setup" },
  ]
  raw = true # Required for the spinner and interactive UIs

  # TODO disabled until GA
  # [tasks.publish]
  # run =[{ task = "//projects/...:publish" }]

  [tasks.sync]
  run = [
    { task = "//projects/shared:build" },
    { task = "//projects/...:sync" },
  ]

  [tasks.setup]
  run = [
    { task = "//:setup:*" },
    { task = "//projects/...:setup" },
    { task = "//:sync" },
  ]

  [tasks.ai-postedit]
  description = "Run tsc and linters to detect and fix the warnings and errors in the codebase"
  depends = [ "//:sync" ]
  run = [
    "tsc --noEmit",
    { task = "//projects/...:lint" },
    "eslint --fix",
    { task = "//projects/...:fix" },
  ]

[hooks]
postinstall = [
  "corepack enable",
  "pnpm install --frozen-lockfile",
  "mise setup",
]

[env]
_.file = ".env"
_.path = "./node_modules/.bin"

[settings]
jobs = 8

# Required for hooks as of 2025.10
# https://mise.jdx.dev/hooks.html
experimental = true
