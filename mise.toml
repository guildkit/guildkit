#:schema https://mise.jdx.dev/schema/mise.json

monorepo_root = true

[monorepo]
config_roots = [
  "projects/*",
  "demo"
]

[tools]
node = { version = "24", corepack = true }
"npm:nushell" = "latest"

[tasks]
  [tasks.dev]
  depends = [ "//projects/...:build" ]
  run = [{
    tasks = [
      "//projects/...:dev",
      "//demo:dev"
    ]
  }]

  [tasks.bw]
  depends = [ "//projects/...:build" ]
  run = { tasks = [ "//projects/...:dev" ]}

  [tasks.build]
  run = [{
    tasks = [
      "//projects/...:build",
      "//demo:build",
    ]
  }]

  [tasks.test]
  depends = [ "//projects/...:build" ]
  run = [{
    tasks = [
      "//projects/...:test",
      "//demo:test"
    ]
  }]

  [tasks.lint]
  depends = [ "//projects/...:build" ]
  run = [
    "tsc --noEmit",
    {
      tasks = [
        "//projects/...:lint",
        "//demo:lint",
      ]
    },
    "eslint",
  ]

  [tasks.fix]
  depends = [ "//projects/...:build" ]
  run = [
    "eslint --fix",
    {
      tasks = [
        "//projects/...:fix",
        "//demo:fix",
      ]
    },
  ]

  [tasks.db]
  run = "psql --username=guildkit --dbname=guildkit --host=localhost --port=5432"

  [tasks.clean]
  depends = [ "clean:*" ]

  # TODO disabled until GA
  # [tasks.publish]
  # run =[{ task = "//projects/...:publish" }]

  [tasks.setup]
  run = [
    # { task = "//:setup:*" },
    # { task = "//projects/...:setup" },
    { task = "//projects/...:build" },
    { task = "//demo:setup" },
  ]

  [tasks.ai-postedit]
  description = "Run tsc and linters to detect and fix the warnings and errors in the codebase"
  depends = [ "//projects/...:build" ]
  run = [
    "tsc --noEmit",
    { task = "//projects/...:lint" },
    "eslint --fix",
    { task = "//projects/...:fix" },
  ]

[hooks]
postinstall = [
  "corepack enable",
  "pnpm install --frozen-lockfile",
  { task = "setup" },
]

[env]
_.file = ".env"
_.path = "./node_modules/.bin"

[settings]
jobs = 8
