#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  run = "guildkit dev"

  [tasks.build]
  wait_for = [ "//projects/...:build" ]
  run = "guildkit build"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  wait_for = [ "//projects/...:build" ]
  run = "tsc --noEmit"

  [tasks.deploy]
  wait_for = [ "build" ]
  run = "wrangler deploy"

  [tasks.setup]
  run = { tasks = [ "setup:*" ] }

[env]
_.path = "./node_modules/.bin"
