#:schema https://mise.jdx.dev/schema/mise.json

[tasks]
  [tasks.dev]
  depends = [ "//projects/...:build" ]
  run = "guildkit dev"

  [tasks.build]
  depends = [ "//projects/...:build" ]
  run = "guildkit build"
  env = { NODE_ENV = "production" }

  [tasks.lint]
  depends = [ "//projects/...:build" ]
  run = "tsc --noEmit"

  [tasks.deploy]
  depends = [ "build" ]
  run = "wrangler deploy"

[env]
_.path = "./node_modules/.bin"
