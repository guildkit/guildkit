name: "Deployment (preview)"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      SERVER_ENV: preview
      NEXT_TELEMETRY_DISABLED: 1

      BETTER_AUTH_URL: "https://demo.guildkit.net"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      GOOGLE_CLIENT_ID: DUMMY_CREDENTIAL_REPLACE_ME_ON_PRODUCTION
      GOOGLE_CLIENT_SECRET: DUMMY_CREDENTIAL_REPLACE_ME_ON_PRODUCTION
      GITHUB_CLIENT_ID: DUMMY_CREDENTIAL_REPLACE_ME_ON_PRODUCTION
      GITHUB_CLIENT_SECRET: DUMMY_CREDENTIAL_REPLACE_ME_ON_PRODUCTION
    steps:
      - name: Remove Podman which does not work well on GitHub Actions
        run: sudo apt-get remove -y podman

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - run: mise run build

      - name: "[preview] deploy Cloudflare Worker"
        id: deployment
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          command: versions upload --message "Branch - ${{ github.ref_name }}"
          workingDirectory: "projects/guildkit/"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: "[preview] Add comment for deployment URL"
        run: "gh pr comment ${{ github.event.number }} --edit-last --create-if-none --body 'Deployed to preview:\n${{ steps.deployment.outputs.pages-deployment-alias-url && steps.deployment.outputs.pages-deployment-alias-url || steps.deployment.outputs.deployment-url }}'"
        env:
          GH_TOKEN: ${{ github.token }}
