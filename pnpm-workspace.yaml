packages:
  - "projects/*"
  - "demo"
allowBuilds:
  "@nestjs/core": true
  "@openapitools/openapi-generator-cli": true
  "@parcel/watcher": true
  "@prisma/client": true
  "@prisma/engines": true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  workerd: true
minimumReleaseAge: 4320 # 72 hours
minimumReleaseAgeExclude:
  # Renovate security update: next@16.2.6
  - next@16.2.6
  # Renovate security update: better-auth@1.6.2
  - better-auth@1.6.2
  # Astro 6 requires @astrojs/react v6; the only compatible stable was ~5h short of the
  # 72h window during the Next.js->Astro migration. Safe to drop once it ages past 72h.
  - "@astrojs/react@6.0.0"
