packages:
  - "projects/*"
  - "demo"
allowBuilds:
  "@nestjs/core": true
  "@openapitools/openapi-generator-cli": true
  '@parcel/watcher': true
  "@prisma/client": true
  "@prisma/engines": true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  workerd: true
minimumReleaseAge: 4320 # 72 hours
minimumReleaseAgeExclude:
  # Renovate security update: next@16.2.6
  - next@16.2.6
  # Renovate security update: better-auth@1.6.2
  - better-auth@1.6.2
  - '@astrojs/internal-helpers@0.10.0'
  - '@astrojs/markdown-remark@7.2.0'
  - astro@6.4.2
  - '@phanect/utils@4.0.0'
