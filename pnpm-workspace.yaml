packages:
  - "projects/*"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAge: 4320 # 72 hours
minimumReleaseAgeExclude:
  # Renovate security update: next@16.2.6
  - next@16.2.6
  # Renovate security update: better-auth@1.6.2 || 1.6.11
  - better-auth@1.6.2 || 1.6.11
